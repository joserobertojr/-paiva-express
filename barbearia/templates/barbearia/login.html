<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Boss Barbearia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Open Sans', sans-serif;
      position: relative; overflow: hidden;
    }
    /* Decorative lines */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 30px,
        rgba(255,215,0,.025) 30px, rgba(255,215,0,.025) 31px
      );
    }
    .login-wrap {
      background: #111;
      border: 1px solid rgba(255,215,0,.2);
      border-radius: 16px;
      padding: 2.5rem 2.25rem;
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand .scissors { font-size: 2.5rem; color: #FFD700; }
    .brand h1 { font-family: 'Oswald', sans-serif; font-size: 2.2rem; font-weight: 700; color: #FFD700; letter-spacing: 3px; margin: .3rem 0 0; }
    .brand p { color: rgba(255,255,255,.4); font-size: .72rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
    .divider { border: none; border-top: 1px solid rgba(255,215,0,.15); margin: 1.5rem 0; }
    .form-label { color: rgba(255,255,255,.6); font-size: .82rem; font-weight: 600; }
    .form-control {
      background: #1a1a1a; border: 1px solid #333; color: #fff;
      border-radius: 8px; padding: .7rem 1rem;
    }
    .form-control:focus { background: #1a1a1a; border-color: #FFD700; box-shadow: 0 0 0 .2rem rgba(255,215,0,.2); color: #fff; }
    .form-control::placeholder { color: #555; }
    .input-group-text { background: #1a1a1a; border-color: #333; color: #666; }
    .btn-login {
      background: #FFD700; color: #000; border: none; width: 100%;
      padding: .8rem; font-family: 'Oswald', sans-serif; font-size: 1rem;
      font-weight: 700; letter-spacing: 1px; border-radius: 8px; transition: all .2s;
    }
    .btn-login:hover { background: #d4af00; color: #000; transform: translateY(-1px); }
    .alert-danger { background: rgba(220,38,38,.15); border: 1px solid rgba(220,38,38,.3); color: #f87171; border-radius: 8px; font-size: .85rem; }
    .footer-text { text-align: center; color: rgba(255,255,255,.25); font-size: .72rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="scissors"><i class="fas fa-scissors"></i></div>
      <h1>BOSS</h1>
      <p>Barbearia — Sistema de Gestão</p>
    </div>
    <hr class="divider">

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger mb-3">
        <i class="fas fa-exclamation-circle me-2"></i>{{ msg }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-user me-1"></i> Usuário</label>
        <input type="text" name="username" class="form-control" placeholder="Seu usuário" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="fas fa-lock me-1"></i> Senha</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>ENTRAR NO SISTEMA
      </button>
    </form>

    <p class="footer-text">Boss Barbearia © 2025 — Acesso Restrito</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
