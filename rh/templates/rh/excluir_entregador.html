{% extends 'rh/base.html' %}

{% block conteudo %}
<div class="col-md-6 offset-md-3 mt-5">
    <div class="card shadow border-danger">
        <div class="card-header bg-danger text-white text-center">
            <h4 class="mb-0">⚠️ Confirmação de Exclusão</h4>
        </div>
        <div class="card-body text-center p-4">
            <h5 class="mb-4">Tem certeza que deseja excluir o entregador<br><strong>{{ entregador.nome }}</strong>?</h5>
            <p class="text-muted">Esta ação não pode ser desfeita e todos os dados serão apagados do sistema.</p>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <a href="{% url 'ver_entregador' entregador.id %}" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4">Sim, Excluir</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
