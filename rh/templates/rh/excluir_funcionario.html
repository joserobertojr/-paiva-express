{% extends 'rh/base.html' %}

{% block conteudo %}
<div class="col-md-6 offset-md-3">
    <div class="card shadow-sm border-danger">
        <div class="card-header bg-danger text-white text-center">
            <h4 class="mb-0">⚠️ Confirmação de Exclusão</h4>
        </div>
        <div class="card-body text-center py-5">
            <p class="fs-5">Você tem certeza que deseja excluir permanentemente o(a) funcionário(a):</p>
            <h3 class="text-danger fw-bold my-4">{{ funcionario.nome }}?</h3>
            <p class="text-muted">Todos os documentos vinculados a ele também serão apagados.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">Sim, Excluir!</button>
                <a href="{% url 'ver_funcionario' funcionario.id %}" class="btn btn-secondary btn-lg ms-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
