{% extends 'rh/base.html' %}

{% block conteudo %}
<div class="col-md-6 offset-md-3">
    <div class="card shadow-sm">
        <!-- Cabeçalho com botão Voltar à direita -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Anexar Documento</h4>
            <a href="{% url 'ver_funcionario' funcionario.id %}" class="btn btn-outline-light btn-sm">⬅ Voltar</a>
        </div>
        <div class="card-body">
            <p class="text-muted small">Funcionário: <strong>{{ funcionario.nome }}</strong></p>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Título do Documento</label>
                    {{ form.titulo }}
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Arquivo (PDF, Imagem, etc)</label>
                    {{ form.arquivo }}
                </div>

                <!-- Campo oculto -->
                <div style="display:none;">{{ form.funcionario }}</div>

                <button type="submit" class="btn btn-success w-100 mt-3">Confirmar Upload</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
