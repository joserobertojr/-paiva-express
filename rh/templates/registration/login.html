{% extends 'rh/base.html' %}

{% block titulo %}Entrar · Paiva Express{% endblock %}

{% block conteudo %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo"><i class="bi bi-truck"></i></div>
            <h1 class="mb-1">Paiva Express</h1>
            <p class="text-muted mb-0">Acesse o sistema interno</p>
        </div>

        <form method="post" class="login-form">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-circle"></i> Usuário ou senha inválidos.
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Usuário</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus required>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Senha</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
    </div>
</div>

<style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    main { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-wrapper { width: 100%; max-width: 420px; }
    .login-card {
        background: #fff;
        padding: 40px 36px;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }
    .login-brand { text-align: center; margin-bottom: 28px; }
    .login-logo {
        width: 60px; height: 60px;
        background: linear-gradient(135deg, #f97316, #ea580c);
        border-radius: 16px;
        display: inline-flex; align-items: center; justify-content: center;
        color: #fff; font-size: 1.8rem;
        margin-bottom: 14px;
        box-shadow: 0 6px 20px rgba(249, 115, 22, .35);
    }
    .login-brand h1 { font-size: 1.5rem; margin: 0; }
</style>
{% endblock %}
